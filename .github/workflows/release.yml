name: Release

on:
  push:
    tags:
      - '**'

permissions:
  contents: write

jobs:
  call-workflow:
    uses: Pinta365/Pinta365/.github/workflows/addon-release.yml@main
    with:
      addon_name: "Keystone Roulette"
      cf_url: "https://www.curseforge.com/wow/addons/keystone-roulette"
      wago_url: "https://addons.wago.io/addons/keystone-roulette"
    secrets:
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}